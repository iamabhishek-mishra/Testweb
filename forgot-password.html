<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password – Sudha Wellness</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="auth-body">

  <div data-include="header.html"></div>

  <main class="auth-main">
    <div class="auth-left">
      <div class="auth-left-content">
        <div class="auth-brand"><img src="LOGO%20SW.jpeg" alt="Sudha Wellness" class="site-logo" /></div>
        <h2>Reset your<br /><span class="auth-highlight">password</span></h2>
        <p>Enter your email address and we’ll send you a reset link (demo mode: we’ll show a success message).</p>
        <div class="auth-features">
          <div class="auth-feat-item">🔒 Secure account recovery</div>
          <div class="auth-feat-item">📩 Reset link via email</div>
          <div class="auth-feat-item">⚡ Takes less than a minute</div>
        </div>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-card">
        <div class="auth-card-header">
          <h1>Forgot Password</h1>
          <p>Remembered it? <a href="login.html">Back to login</a></p>
        </div>

        <div class="auth-alert auth-alert-error" id="errorBanner" style="display:none;"></div>
        <div class="auth-alert auth-alert-success" id="successBanner" style="display:none;"></div>

        <form id="forgotForm" novalidate>
          <div class="form-group">
            <label>Email Address *</label>
            <div class="input-icon-wrap">
              <span class="input-icon">✉️</span>
              <input type="email" id="forgotEmail" placeholder="priya@example.com" required autocomplete="email" />
            </div>
            <span class="field-error" id="err-forgotEmail"></span>
          </div>

          <button type="submit" class="btn-auth" id="forgotBtn">
            <span id="forgotBtnText">Send Reset Link</span>
            <span id="forgotBtnLoader" style="display:none;">⏳ Sending...</span>
          </button>
        </form>
      </div>
    </div>
  </main>

  <div data-include="footer.html"></div>

  <script src="layout.js"></script>
  <script src="auth.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      clearAllFieldErrors();
      clearBanners();

      const email = document.getElementById('forgotEmail').value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setFieldError('forgotEmail', 'Valid email required');
        return;
      }

      const btn = document.getElementById('forgotBtn');
      document.getElementById('forgotBtnText').style.display = 'none';
      document.getElementById('forgotBtnLoader').style.display = 'inline';
      btn.disabled = true;

      try {
        const res = await fetch(BACKEND_URL + '/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (data.success) {
          showSuccess('Reset link sent! Please check your email.');
        } else {
          showError(data.message || 'Could not send reset link.');
        }
      } catch (_) {
        showSuccess('Reset link sent! Please check your email.');
      } finally {
        document.getElementById('forgotBtnText').style.display = 'inline';
        document.getElementById('forgotBtnLoader').style.display = 'none';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
